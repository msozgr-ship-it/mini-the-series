<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiomJourney | Spatial Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=5.10">
</head>
<body>
    <div class="bg-spatial"></div>

    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-s-small">S</div>
            <nav class="nav-links"><a href="#" onclick="resetFilter()">Anasayfa</a></nav>
        </div>
        <div class="nav-right">
            <div class="search-container" id="search-container">
                <div class="search-bar">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
                        <line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Arama..." autocomplete="off">
                    <span class="search-clear-btn" id="search-clear" onclick="clearSearchInput(event)">✕</span>
                </div>
                <div class="search-results-panel" id="search-results-panel"></div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <section class="hero-spatial" id="hero-drag-area">
            <div class="orbital-wrapper">
                <div class="giant-s-neon">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
                                <stop offset="45%" stop-color="var(--accent)"/>
                                <stop offset="100%" stop-color="#4a0005"/>
                            </linearGradient>
                            <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
                                <feGaussianBlur stdDeviation="5" result="blur"/>
                                <feMerge>
                                    <feMergeNode in="blur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>
                        <!-- Uzamsal Sinematik Odak Çizgileri (Professional Lens Crosshairs) -->
                        <line x1="50" y1="2" x2="50" y2="8" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
                        <line x1="50" y1="92" x2="50" y2="98" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
                        <line x1="2" y1="50" x2="8" y2="50" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
                        <line x1="92" y1="50" x2="98" y2="50" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>

                        <!-- İki Adet Dairesel Yörünge Halkası -->
                        <circle cx="50" cy="50" r="43" stroke="rgba(255, 15, 35, 0.22)" stroke-width="0.8" stroke-dasharray="4 3" />
                        <circle cx="50" cy="50" r="37" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" />

                        <!-- Matematiksel Olarak Kusursuz Simetrik Geometrik S-Ribbon -->
                        <path d="M 72 26 
                                 C 72 12, 28 12, 28 34 
                                 C 28 57, 72 53, 72 74 
                                 C 72 88, 28 88, 28 74" 
                              stroke="url(#sGrad)" 
                              stroke-width="7.5" 
                              stroke-linecap="round" 
                              stroke-linejoin="round"
                              filter="url(#glow)"/>

                        <!-- 3D Specular Işık Hattı (Elmas Parlaklığı) -->
                        <path d="M 72 26 
                                 C 72 12, 28 12, 28 34 
                                 C 28 57, 72 53, 72 74 
                                 C 72 88, 28 88, 28 74" 
                              stroke="#ffffff" 
                              stroke-width="1.2" 
                              stroke-linecap="round" 
                              stroke-linejoin="round" 
                              opacity="0.8" />
                    </svg>
                </div>

                <div class="orbital-belt" id="orbital-container"></div>
            </div>
        </section>

        <main class="content-matrix" id="content-matrix"></main>
    </div>

    <!-- SERIES LIST MODAL -->
    <div id="details-modal" class="details-modal">
        <div class="modal-close" onclick="closeDetails()">✕</div>
        <div class="modal-inner">
            <h1 id="details-title"></h1>
            <div class="series-grid" id="details-grid"></div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div id="player-modal" class="player-modal">
        <div class="player-backdrop" id="player-backdrop"></div>
        <div class="player-header">
            <div class="player-title-info">
                <span class="player-badge">SINEMA MODU</span>
                <h3 id="player-title">Film Adı</h3>
            </div>
            <div class="player-close-btn" onclick="closePlayer()">✕ Kapat</div>
        </div>
        <div class="player-canvas">
            <div class="player-glow"></div>
            <div class="player-container">
                <div class="player-logo-blocker">
                    <span class="blocker-dot"></span>
                </div>

                <iframe id="player-frame" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>
            </div>
        </div>
    </div>

    <!-- PREMIUM COMING SOON MODAL -->
    <div id="coming-soon-modal" class="coming-soon-modal" onclick="closeComingSoon()">
        <div class="cs-backdrop" id="cs-backdrop"></div>
        <div class="cs-card" onclick="event.stopPropagation()">
            <div class="cs-close" onclick="closeComingSoon()">✕</div>
            <div class="cs-content">
                <div class="cs-badge">YAKINDA</div>
                <h2 id="cs-title">Film Adı</h2>
                <div class="cs-divider"></div>
                <p>Bu sinematik deneyim şu anda ekibimiz tarafından özenle hazırlanıyor.</p>
                <div class="cs-pulse-line"></div>
                <span class="cs-subtext">Spatially Tuned & Rendering</span>
            </div>
        </div>
    </div>

    <script src="js/data.js?v=5.10"></script>
    <script src="js/app.js?v=5.10"></script>
</body>
</html>
