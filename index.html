<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiomJourney | Spatial Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=5.15">
</head>
<body>
    <div class="bg-spatial"></div>

    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-s-small">S</div>
            <nav class="nav-links"><a href="#" onclick="resetFilter()">Anasayfa</a></nav>
        </div>
        <div class="nav-right">
            <div class="search-container" id="search-container">
                <div class="search-bar">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
                        <line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Arama..." autocomplete="off">
                    <span class="search-clear-btn" id="search-clear" onclick="clearSearchInput(event)">✕</span>
                </div>
                <div class="search-results-panel" id="search-results-panel"></div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <section class="hero-spatial" id="hero-drag-area">
            <div class="orbital-wrapper">
                <div class="giant-s-neon">
                    <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <!-- Neon Accent Gradient -->
                            <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ff0f23" />
                                <stop offset="40%" stop-color="#ff4d5a" />
                                <stop offset="60%" stop-color="#ff8591" />
                                <stop offset="100%" stop-color="#ff0f23" />
                            </linearGradient>
                            <!-- Dark Metallic Support Gradient (3D Hissiyatı katan gövde rengi) -->
                            <linearGradient id="metalGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#121216" />
                                <stop offset="100%" stop-color="#2a2a35" />
                            </linearGradient>
                            <!-- Cinematic Glow Filter -->
                            <filter id="spatialGlow" x="-30%" y="-30%" width="160%" height="160%">
                                <feGaussianBlur stdDeviation="8" result="blur1" />
                                <feGaussianBlur stdDeviation="3" result="blur2" />
                                <feMerge>
                                    <feMergeNode in="blur1" />
                                    <feMergeNode in="blur2" />
                                    <feMergeNode in="SourceGraphic" />
                                </feMerge>
                            </filter>
                        </defs>

                        <!-- High-Tech Camera Focus Grid & Orbital Rings -->
                        <circle cx="60" cy="60" r="54" stroke="rgba(255, 15, 35, 0.06)" stroke-width="1" stroke-dasharray="2 4" />
                        <circle cx="60" cy="60" r="48" stroke="rgba(255, 255, 255, 0.02)" stroke-width="0.75" />
                        
                        <!-- Diagonal Crosshair Lines -->
                        <line x1="60" y1="15" x2="60" y2="105" stroke="rgba(255, 255, 255, 0.02)" stroke-width="0.5" />
                        <line x1="15" y1="60" x2="105" y2="60" stroke="rgba(255, 255, 255, 0.02)" stroke-width="0.5" />

                        <!-- Sleek Solid Metallic Dark Base Ribbon (3D Derinlik Katan Arka Gövde) -->
                        <path d="M 85 36 
                                 C 85 20, 35 20, 35 44 
                                 C 35 68, 85 64, 85 88 
                                 C 85 104, 35 104, 35 88" 
                              stroke="url(#metalGrad)" 
                              stroke-width="12" 
                              stroke-linecap="round" 
                              stroke-linejoin="round" />

                        <!-- Glowing Neon Active S-Ribbon (Metalin üzerindeki parlayan neon şerit) -->
                        <path d="M 85 36 
                                 C 85 20, 35 20, 35 44 
                                 C 35 68, 85 64, 85 88 
                                 C 85 104, 35 104, 35 88" 
                              stroke="url(#neonGrad)" 
                              stroke-width="7" 
                              stroke-linecap="round" 
                              stroke-linejoin="round"
                              filter="url(#spatialGlow)" />

                        <!-- Specular Diamond Core Light Line (Çarpıcı elmas keskinliğinde ışık yansıması) -->
                        <path d="M 85 36 
                                 C 85 20, 35 20, 35 44 
                                 C 35 68, 85 64, 85 88" 
                              stroke="#ffffff" 
                              stroke-width="1.2" 
                              stroke-linecap="round" 
                              stroke-linejoin="round" 
                              opacity="0.85" />
                              
                        <!-- High-Tech Glowing Core Nodes (Uçlardaki parlayan lazer ledler) -->
                        <circle cx="85" cy="36" r="2" fill="#ffffff" filter="url(#spatialGlow)" />
                        <circle cx="35" cy="88" r="2" fill="#ffffff" filter="url(#spatialGlow)" />
                    </svg>
                </div>


                <div class="orbital-belt" id="orbital-container"></div>
            </div>
        </section>

        <main class="content-matrix" id="content-matrix"></main>
    </div>

    <!-- SERIES LIST MODAL -->
    <div id="details-modal" class="details-modal">
        <div class="modal-close" onclick="closeDetails()">✕</div>
        <div class="modal-inner">
            <h1 id="details-title"></h1>
            <div class="series-grid" id="details-grid"></div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div id="player-modal" class="player-modal">
        <div class="player-backdrop" id="player-backdrop"></div>
        <div class="player-header">
            <div class="player-title-info">
                <span class="player-badge">SINEMA MODU</span>
                <h3 id="player-title">Film Adı</h3>
            </div>
            <div class="player-header-actions" style="display: flex; gap: 15px; align-items: center;">
                <div class="player-fullscreen-btn" onclick="toggleCinemaFullscreen()">📺 Tam Ekran</div>
                <div class="player-close-btn" onclick="closePlayer()">✕ Kapat</div>
            </div>

        </div>
        <div class="player-canvas">
            <div class="player-glow"></div>
            <div class="player-container">
                <div class="player-logo-blocker">
                    <span class="blocker-dot"></span>
                </div>

                <iframe id="player-frame" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>
            </div>
        </div>
    </div>

    <!-- PREMIUM COMING SOON MODAL -->
    <div id="coming-soon-modal" class="coming-soon-modal" onclick="closeComingSoon()">
        <div class="cs-backdrop" id="cs-backdrop"></div>
        <div class="cs-card" onclick="event.stopPropagation()">
            <div class="cs-close" onclick="closeComingSoon()">✕</div>
            <div class="cs-content">
                <div class="cs-badge">YAKINDA</div>
                <h2 id="cs-title">Film Adı</h2>
                <div class="cs-divider"></div>
                <p>Bu sinematik deneyim şu anda ekibimiz tarafından özenle hazırlanıyor.</p>
                <div class="cs-pulse-line"></div>
                <span class="cs-subtext">Spatially Tuned & Rendering</span>
            </div>
        </div>
    </div>

    <script src="js/data.js?v=5.15"></script>
    <script src="js/app.js?v=5.15"></script>
</body>
</html>
