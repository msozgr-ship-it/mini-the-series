<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiomJourney | Spatial Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=5.24">
</head>
<body>
    <div class="bg-spatial"></div>
    <div class="hero-video-bg" id="hero-video-bg"></div>

    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-s-small" onclick="resetFilter()">S</div>
        </div>
        <div class="nav-right">
            <div class="search-container" id="search-container">
                <div class="search-bar">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
                        <line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Arama..." autocomplete="off">
                    <span class="search-clear-btn" id="search-clear" onclick="clearSearchInput(event)">✕</span>
                </div>
                <div class="search-results-panel" id="search-results-panel"></div>
            </div>
        </div>
    </header>


    <div class="main-container">
        <section class="hero-spatial" id="hero-drag-area">
            <div class="orbital-wrapper">



                <div class="orbital-belt" id="orbital-container"></div>
            </div>
        </section>

        <main class="content-matrix" id="content-matrix"></main>
    </div>

    <!-- SERIES LIST MODAL -->
    <div id="details-modal" class="details-modal">
        <div class="modal-close" onclick="closeDetails()">✕</div>
        <div class="modal-inner">
            <h1 id="details-title"></h1>
            <div class="series-grid" id="details-grid"></div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div id="player-modal" class="player-modal">
        <div class="player-backdrop" id="player-backdrop"></div>
        <div class="player-header">
            <div class="player-title-info">
                <span class="player-badge" id="player-badge-text">SINEMA MODU</span>
                <h3 id="player-title">Film Adı</h3>
                <div id="player-source-toggles" style="display: none; gap: 10px; margin-top: 10px;">
                    <button id="btn-play-movie" class="src-toggle-btn active">Filmi İzle</button>
                    <button id="btn-play-trailer" class="src-toggle-btn">Fragmanı İzle</button>
                </div>
            </div>
            <div class="player-close-btn" onclick="closePlayer()">✕ Kapat</div>
        </div>
        <div class="player-canvas">
            <div class="player-glow"></div>
            <div class="player-container">
                <div class="player-logo-blocker">
                    <span class="blocker-dot"></span>
                </div>

                <iframe id="player-frame" allow="autoplay; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" oallowfullscreen="true" msallowfullscreen="true"></iframe>
            </div>
        </div>

    </div>

    <!-- PREMIUM COMING SOON MODAL -->
    <div id="coming-soon-modal" class="coming-soon-modal" onclick="closeComingSoon()">
        <div class="cs-backdrop" id="cs-backdrop"></div>
        <div class="cs-card" onclick="event.stopPropagation()">
            <div class="cs-close" onclick="closeComingSoon()">✕</div>
            <div class="cs-content">
                <div class="cs-badge">YAKINDA</div>
                <h2 id="cs-title">Film Adı</h2>
                <div class="cs-divider"></div>
                <p>Bu sinematik deneyim şu anda ekibimiz tarafından özenle hazırlanıyor.</p>
                <div class="cs-pulse-line"></div>
                <span class="cs-subtext">Spatially Tuned & Rendering</span>
            </div>
        </div>
    </div>

    <script src="js/data.js?v=5.24"></script>
    <script src="js/app.js?v=5.24"></script>
    <script>
        // PLAYER SOURCE TOGGLE LOGIC
        document.addEventListener("DOMContentLoaded", () => {
            const btnMovie = document.getElementById('btn-play-movie');
            const btnTrailer = document.getElementById('btn-play-trailer');
            const iframe = document.getElementById('player-frame');
            const titleEl = document.getElementById('player-title');
            const badgeEl = document.getElementById('player-badge-text');
            const togglesContainer = document.getElementById('player-source-toggles');

            let currentMovieData = null;
            let currentMovieFileUrl = "";

            function formatTrailerUrl(url) {
                if(url && url.includes("youtu.be")) {
                    let id = url.split("youtu.be/")[1].split("?")[0];
                    let start = url.includes("start=") ? "&start=" + url.split("start=")[1] : "";
                    return `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&controls=1&showinfo=0&modestbranding=1&rel=0&playsinline=1${start}`;
                }
                return url;
            }

            const observer = new MutationObserver(() => {
                const rawTitle = titleEl.innerText;
                currentMovieData = null;
                
                if(window.DB) {
                    currentMovieData = window.DB.movies.find(m => m.title === rawTitle);
                    if(!currentMovieData && rawTitle.includes(' - ')) {
                        const seriesTitle = rawTitle.split(' - ')[0];
                        const epTitle = rawTitle.split(' - ')[1];
                        const seriesObj = window.DB.movies.find(m => m.title === seriesTitle);
                        if(seriesObj && seriesObj.collection) {
                            currentMovieData = seriesObj.collection.find(ep => ep.title === epTitle);
                            // Fallback to series trailer if episode has none
                            if(currentMovieData && !currentMovieData.trailer && seriesObj.trailer) {
                                currentMovieData.trailer = seriesObj.trailer;
                            }
                        }
                    }
                }

                if(currentMovieData && currentMovieData.trailer && currentMovieData.file) {
                    togglesContainer.style.display = 'flex';
                    btnMovie.classList.add('active');
                    btnTrailer.classList.remove('active');
                    badgeEl.innerText = "SİNEMA MODU";
                    // Save app.js formatted URL after a short delay
                    setTimeout(() => {
                        if(badgeEl.innerText === "SİNEMA MODU") {
                            currentMovieFileUrl = iframe.src;
                        }
                    }, 50);
                } else {
                    togglesContainer.style.display = 'none';
                }
            });

            if(titleEl) {
                observer.observe(titleEl, { childList: true, characterData: true, subtree: true });
            }

            if(btnMovie && btnTrailer) {
                btnMovie.addEventListener('click', () => {
                    if(!currentMovieData) return;
                    btnMovie.classList.add('active');
                    btnTrailer.classList.remove('active');
                    badgeEl.innerText = "SİNEMA MODU";
                    iframe.src = currentMovieFileUrl || currentMovieData.file;
                });

                btnTrailer.addEventListener('click', () => {
                    if(!currentMovieData || !currentMovieData.trailer) return;
                    btnTrailer.classList.add('active');
                    btnMovie.classList.remove('active');
                    badgeEl.innerText = "FRAGMAN MODU";
                    iframe.src = formatTrailerUrl(currentMovieData.trailer);
                });
            }
        });
    </script>
</body>
</html>
